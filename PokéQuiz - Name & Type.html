<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéQuiz - Name & Type</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .pokemon-card { margin-bottom: 1.5rem; }
        #pokemon-img { width: 150px; height: 150px; background: #f8f9fa; border-radius: 50%; padding: 10px; }
        .inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        #submit-btn { background-color: #4CAF50; color: white; }
        #reset-btn { background-color: #f44336; color: white; }
        button:hover { opacity: 0.8; }
        .scoreboard { margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: #333; border-top: 1px solid #eee; padding-top: 15px; }
        #message { height: 20px; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Who's That Pokémon?</h2>
    <div id="message"></div>
    
    <div class="pokemon-card">
        <img id="pokemon-img" src="" alt="Pokemon">
    </div>

    <div class="inputs">
        <input type="text" id="guess-name" placeholder="Enter Pokémon Name">
        <select id="guess-type">
            <option value="" disabled selected>Select Primary Type</option>
            <option value="normal">Normal</option><option value="fire">Fire</option>
            <option value="water">Water</option><option value="grass">Grass</option>
            <option value="electric">Electric</option><option value="ice">Ice</option>
            <option value="fighting">Fighting</option><option value="poison">Poison</option>
            <option value="ground">Ground</option><option value="flying">Flying</option>
            <option value="psychic">Psychic</option><option value="bug">Bug</option>
            <option value="rock">Rock</option><option value="ghost">Ghost</option>
            <option value="dragon">Dragon</option><option value="dark">Dark</option>
            <option value="steel">Steel</option><option value="fairy">Fairy</option>
        </select>
    </div>

    <div class="btn-group">
        <button id="submit-btn" onclick="checkAnswer()">Submit</button>
        <button id="reset-btn" onclick="resetGame()">Reset</button>
    </div>

    <div class="scoreboard">
        Score: <span id="score-val">0</span>
    </div>
</div>

<script>
    let currentPokemon = null;
    let score = 0;

    // --- Cookie Utilities ---
    function setCookie(name, value) {
        document.cookie = `${name}=${value}; path=/; max-age=31536000`; // 1 year
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    // --- Game Logic ---
    async function fetchRandomPokemon() {
        const randomId = Math.floor(Math.random() * 151) + 1; // Gen 1
        try {
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
            const data = await response.json();
            currentPokemon = {
                name: data.name.toLowerCase(),
                type: data.types[0].type.name,
                image: data.sprites.front_default
            };
            document.getElementById('pokemon-img').src = currentPokemon.image;
        } catch (error) {
            console.error("Error fetching Pokemon:", error);
        }
    }

    function updateScoreDisplay() {
        // Use Math.round to avoid messy decimals from divisions
        const displayScore = Number.isInteger(score) ? score : score.toFixed(2);
        document.getElementById('score-val').innerText = displayScore;
        setCookie('quizScore', score);
    }

    function checkAnswer() {
        const nameInput = document.getElementById('guess-name').value.toLowerCase().trim();
        const typeInput = document.getElementById('guess-type').value;
        const msg = document.getElementById('message');

        if (!nameInput || !typeInput) {
            msg.innerText = "Please fill both fields!";
            msg.style.color = "orange";
            return;
        }

        if (nameInput === currentPokemon.name && typeInput === currentPokemon.type) {
            score += 1;
            msg.innerText = "Correct! +1 Point";
            msg.style.color = "green";
        } else {
            score = score / 2;
            msg.innerText = `Wrong! It was ${currentPokemon.name} (${currentPokemon.type}). Score halved!`;
            msg.style.color = "red";
        }

        updateScoreDisplay();
        clearInputs();
        fetchRandomPokemon();
    }

    function clearInputs() {
        document.getElementById('guess-name').value = "";
        document.getElementById('guess-type').selectedIndex = 0;
    }

    function resetGame() {
        score = 0;
        updateScoreDisplay();
        clearInputs();
        document.getElementById('message').innerText = "Game Restarted!";
        fetchRandomPokemon();
    }

    // Initialize Game
    window.onload = () => {
        const savedScore = getCookie('quizScore');
        if (savedScore) {
            score = parseFloat(savedScore);
            updateScoreDisplay();
        }
        fetchRandomPokemon();
    };
</script>

</body>
</html>
